spring:
  application:
    name: financial-advisor

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/financialadvisor}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  websocket:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope:
              - openid
              - profile
              - email
            # Use explicit redirect URI from environment variable, fallback to baseUrl template
            redirect-uri: ${GOOGLE_REDIRECT_URI:{baseUrl}/login/oauth2/code/{registrationId}}
        provider:
          google:
            issuer-uri: https://accounts.google.com

server:
  port: ${PORT:8080}
  # Trust proxy headers (important for Railway/cloud deployments)
  forward-headers-strategy: framework
  use-forward-headers: true

# LLM Provider Configuration (OpenAI)
# Uses OpenAI's Chat Completions API via LangChain4j's OpenAI client.
# Set OPENAI_API_KEY in the environment (Railway). Each tier's model is override-able via env, so you
# can swap models (e.g. gpt-4o -> gpt-4.1 or a newer model) without a code change.
# NOTE: gpt-4o / gpt-4o-mini support the `temperature` parameter. If you switch a tier to an o-series
# reasoning model that rejects temperature, also set that tier's *_TEMPERATURE to 1.
openai:
  api-key: ${OPENAI_API_KEY:}
  base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
  # Orchestrator: planning + final-answer synthesis (the quality-critical role).
  orchestrator:
    model: ${OPENAI_ORCHESTRATOR_MODEL:gpt-4o}
    temperature: ${OPENAI_ORCHESTRATOR_TEMPERATURE:0.0}
    timeout-seconds: ${OPENAI_ORCHESTRATOR_TIMEOUT_SECONDS:90}
  # Sub-agents: tool-calling agents (market, profile, web search, fintwit).
  agent:
    model: ${OPENAI_AGENT_MODEL:gpt-4o}
    temperature: ${OPENAI_AGENT_TEMPERATURE:0.0}
    timeout-seconds: ${OPENAI_AGENT_TIMEOUT_SECONDS:60}
  # Security gate: cheap, fast input classification (no tools).
  security:
    model: ${OPENAI_SECURITY_MODEL:gpt-4o-mini}
    temperature: ${OPENAI_SECURITY_TEMPERATURE:0.0}
    timeout-seconds: ${OPENAI_SECURITY_TIMEOUT_SECONDS:20}

# Agent Timeout Configuration
agent:
  timeout:
    # Timeout for individual agent tool calls (in seconds)
    tool-call-seconds: ${AGENT_TOOL_TIMEOUT_SECONDS:10}
    # Timeout for orchestrator's main chat call (in seconds)
    orchestrator-seconds: ${AGENT_ORCHESTRATOR_TIMEOUT_SECONDS:90}
    # Timeout for security validation checks (wraps the LLM call; allow for provider cold start)
    security-seconds: ${AGENT_SECURITY_TIMEOUT_SECONDS:8}

# External API Configuration
market-data:
  # Finnhub API - Get API key from https://finnhub.io/
  # Free tier: 60 API calls/minute, 1,000,000 calls/month
  # Set FINNHUB_API_KEY environment variable on Railway
  finnhub:
    api-key: ${FINNHUB_API_KEY:}
    base-url: ${FINNHUB_BASE_URL:https://finnhub.io/api/v1}
    timeout-seconds: ${MARKET_DATA_TIMEOUT_SECONDS:10}

  yahoo-finance:
    base-url: https://query1.finance.yahoo.com/v8/finance/chart

  news-api:
    api-key: ${NEWS_API_KEY:}
    base-url: https://newsapi.org/v2

# Rate Limiting Configuration
# Per-session rate limits (using token bucket algorithm)
rate-limit:
  # Advisor endpoint rate limits
  advisor:
    # Maximum number of requests allowed
    capacity: ${RATE_LIMIT_CAPACITY:20}
    # Number of tokens to refill per period
    refill-tokens: ${RATE_LIMIT_REFILL:10}
    # Refill period in seconds
    refill-period-seconds: ${RATE_LIMIT_REFILL_PERIOD:60}

# Web Search Configuration
# Tavily Direct API - Recommended for LLM agents
# Get API key from https://tavily.com
# Free tier: 1,000 searches/month, Paid: $20/month for 10,000 searches
web-search:
  tavily:
    api-key: ${TAVILY_API_KEY:}
    base-url: ${TAVILY_BASE_URL:https://api.tavily.com}
  # Serper API (Google Search) - Alternative to Tavily
  # Free tier: 2,500 searches/month, Paid: $50/month for 10,000 searches
  serper:
    api-key: ${SERPER_API_KEY:}
    base-url: ${SERPER_BASE_URL:https://google.serper.dev}

# Fintwit Analysis Configuration
# Twitter API v2 (optional) - Get bearer token from https://developer.twitter.com
# If not available, will use web search to find fintwit content
fintwit:
  twitter:
    bearer-token: ${TWITTER_BEARER_TOKEN:}
    base-url: ${TWITTER_API_BASE_URL:https://api.twitter.com/2}

# JWT Configuration
jwt:
  # No inline fallback on purpose: the app FAILS FAST at startup if JWT_SECRET is unset, too short, or the
  # known placeholder (see JwtService.validateSecret). Generate one with `openssl rand -base64 48` and set it
  # as the JWT_SECRET env var on Railway. Local/test profiles supply their own dev secret.
  secret: ${JWT_SECRET:}
  expiration: ${JWT_EXPIRATION:86400000} # 24 hours in milliseconds

logging:
  level:
    com.agent.financialadvisor: DEBUG
    dev.langchain4j: INFO
    org.hibernate.SQL: DEBUG
    org.springframework.web: INFO
    org.springframework.security: DEBUG
