spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

# JWT (test only)
jwt:
  secret: test-only-jwt-secret-value-minimum-32-characters-long-12345
  expiration: 86400000

# LLM config for tests. Tests inject mock ChatLanguageModels and never build the real beans,
# but a dummy key keeps things safe if any context-loading test touches the config.
openai:
  api-key: test-dummy-key
  base-url: https://api.openai.com/v1

logging:
  level:
    com.agent.financialadvisor: DEBUG
    org.hibernate.SQL: DEBUG

